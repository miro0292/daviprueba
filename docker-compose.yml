services:

  # ── Infraestructura ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: daviprueba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/scripts/01_init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: daviprueba-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core Services (Python) ─────────────────────────────────────────────────

  core-usuarios:
    build:
      context: ./core-usuarios
      dockerfile: Dockerfile
    container_name: daviprueba-core-usuarios
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MAX_FAILED_ATTEMPTS: ${MAX_FAILED_ATTEMPTS}
      SERVICE_NAME: core-usuarios
      LOG_LEVEL: INFO
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/core1/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  core-saldo-movimientos:
    build:
      context: ./core-saldo-movimientos
      dockerfile: Dockerfile
    container_name: daviprueba-core-saldo
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SERVICE_NAME: core-saldo-movimientos
      LOG_LEVEL: INFO
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5002/core2/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  core-transferencias:
    build:
      context: ./core-transferencias
      dockerfile: Dockerfile
    container_name: daviprueba-core-transferencias
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SERVICE_NAME: core-transferencias
      LOG_LEVEL: INFO
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5003/core3/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Auth Service (Node.js) ─────────────────────────────────────────────────

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: daviprueba-auth
    restart: unless-stopped
    environment:
      PORT: 3000
      SERVICE_NAME: auth-service
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS}
      CORE_USUARIOS_URL: http://core-usuarios:5001
      CB_TIMEOUT_MS: ${CB_TIMEOUT_MS}
      CB_ERROR_THRESHOLD: ${CB_ERROR_THRESHOLD}
      CB_RESET_TIMEOUT_MS: ${CB_RESET_TIMEOUT_MS}
      CB_MAX_RETRIES: ${CB_MAX_RETRIES}
      CB_RETRY_DELAY_MS: ${CB_RETRY_DELAY_MS}
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      core-usuarios:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/auth/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Orchestrator Service (Java) ────────────────────────────────────────────

  orchestrator-service:
    build:
      context: ./orchestrator-service
      dockerfile: Dockerfile
    container_name: daviprueba-orchestrator
    restart: unless-stopped
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY}
      CORE_SALDO_URL: http://core-saldo-movimientos:5002
      CORE_TRANSFERENCIAS_URL: http://core-transferencias:5003
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      core-saldo-movimientos:
        condition: service_healthy
      core-transferencias:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/orchestrator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Frontend (React / Nginx) ───────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: daviprueba-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      auth-service:
        condition: service_healthy
      orchestrator-service:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
